{% set name = "dsf" %}
{% set version = "0.0.32" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dsf-{{ version }}.tar.gz
  sha256: c33c8a019ba88c1a1f4efd2fe17ac72f92c36e900304aef1ab969bf65ed6b41d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - pandas >=1.5
    - numpy >=1.21

test:
  imports:
    - dsf
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://pypi.org/project/dsf/
  summary: The dsf package provides a collection of datasets used in the book Data Science Foundations and Machine Learning with Python.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - vanraak
